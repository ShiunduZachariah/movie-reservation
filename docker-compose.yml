services:
  postgres:
    image: postgres:18.3
    environment:
      POSTGRES_DB: movie_reservation
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres-data:/var/lib/postgresql

  redis:
    image: redis:8.2.5
    ports:
      - "6379:6379"

volumes:
  postgres-data:
