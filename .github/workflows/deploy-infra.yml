name: Deploy Azure Infrastructure

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "azure/**"
      - ".github/workflows/deploy-infra.yml"

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure resource group exists
        run: |
          az group create \
            --name "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --location "${{ vars.AZURE_LOCATION }}"

      - name: Deploy Bicep template
        run: |
          az deployment group create \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --template-file "./azure/main.bicep" \
            --parameters \
              location="${{ vars.AZURE_LOCATION }}" \
              prefix="${{ vars.AZURE_PREFIX }}" \
              postgresAdminLogin="${{ vars.AZURE_POSTGRES_ADMIN_LOGIN }}" \
              postgresAdminPassword="${{ secrets.AZURE_POSTGRES_ADMIN_PASSWORD }}" \
              storageContainerName="${{ vars.AZURE_STORAGE_CONTAINER_NAME }}" \
              storageQueueName="${{ vars.AZURE_TICKET_EMAIL_QUEUE_NAME }}" \
              deployContainerRegistry=false
